name: Integration Tests (Newman)

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  newman:
    name: Postman / Newman
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: nurtricenter_patient_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_URL: jdbc:postgresql://localhost:5432/nurtricenter_patient_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      CONSUL_ENABLED: "false"
      TRACING_ENABLED: "false"
      SERVER_PORT: "8080"
      # Rabbit and Keycloak are not reachable in CI; disable their health checks
      # so /actuator/health returns UP once the DB is connected.
      MANAGEMENT_HEALTH_RABBIT_ENABLED: "false"
      MANAGEMENT_HEALTH_PING_ENABLED: "true"
      SPRING_RABBITMQ_LISTENER_SIMPLE_AUTO_STARTUP: "false"
      SPRING_RABBITMQ_LISTENER_DIRECT_AUTO_STARTUP: "false"

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Build application (skip tests)
        run: mvn -B -DskipTests package

      - name: Start API in background
        run: |
          JAR=$(ls target/*.jar | grep -v "original" | head -n1)
          echo "Starting $JAR"
          nohup java -jar "$JAR" > app.log 2>&1 &
          echo $! > app.pid

      - name: Wait for /actuator/health
        run: |
          for i in $(seq 1 60); do
            if curl -fs http://localhost:8080/actuator/health | grep -q '"status":"UP"'; then
              echo "Service is UP."
              exit 0
            fi
            sleep 2
          done
          echo "::error::Service did not become healthy."
          tail -n 200 app.log || true
          exit 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Newman
        run: npm install -g newman newman-reporter-htmlextra

      - name: Run Postman collection
        env:
          KEYCLOAK_USER: ${{ secrets.KEYCLOAK_USER }}
          KEYCLOAK_PASSWORD: ${{ secrets.KEYCLOAK_PASSWORD }}
        run: |
          mkdir -p newman-reports
          EXTRA_ARGS=""
          if [ -n "${KEYCLOAK_USER}" ] && [ -n "${KEYCLOAK_PASSWORD}" ]; then
            EXTRA_ARGS="--env-var adminUser=${KEYCLOAK_USER} --env-var adminPassword=${KEYCLOAK_PASSWORD}"
          fi
          newman run test-integration/nur-patients.postman_collection.json \
            -e test-integration/nur-patients.postman_environment.json \
            --env-var baseUrl=http://localhost:8080 \
            ${EXTRA_ARGS} \
            --reporters cli,htmlextra \
            --reporter-htmlextra-export newman-reports/report.html

      - name: Upload Newman HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-report
          path: newman-reports/

      - name: Upload API log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-log
          path: app.log

      - name: Stop API
        if: always()
        run: |
          if [ -f app.pid ]; then
            kill "$(cat app.pid)" || true
          fi
