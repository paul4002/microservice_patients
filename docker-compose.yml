services:
  db:
    image: postgres:16-alpine
    container_name: nurtricenter_patient_db
    environment:
      POSTGRES_DB: ${DB_NAME:-nurtricenter_patient_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-nurtricenter_patient_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: nurtricenter_patient_api
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_URL: jdbc:postgresql://db:5432/${DB_NAME:-nurtricenter_patient_db}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      CONSUL_ENABLED: ${CONSUL_ENABLED:-true}
      CONSUL_HOST: ${CONSUL_HOST:-154.38.180.80}
      CONSUL_PORT: ${CONSUL_PORT:-8500}
      SERVICE_ID: ${SERVICE_ID:-nur-tricenter-patients}
      SERVICE_NAME: ${SERVICE_NAME:-nur-tricenter-patients}
      SERVICE_ADDRESS: ${SERVICE_ADDRESS:-154.38.180.80}
      SERVICE_PORT: ${SERVICE_PORT:-8080}
      HEALTH_CHECK_PATH: ${HEALTH_CHECK_PATH:-/actuator/health}
      HEALTH_CHECK_INTERVAL: ${HEALTH_CHECK_INTERVAL:-15s}
      HEALTH_CHECK_TIMEOUT: ${HEALTH_CHECK_TIMEOUT:-5s}
      CONSUL_DEREGISTER_AFTER: ${CONSUL_DEREGISTER_AFTER:-1m}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8080:8080"

volumes:
  pgdata:
