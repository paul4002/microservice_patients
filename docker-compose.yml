services:
  db:
    image: postgres:16-alpine
    container_name: nurtricenter_patient_db
    environment:
      POSTGRES_DB: ${DB_NAME:-nurtricenter_patient_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-nurtricenter_patient_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: nurtricenter_patient_api
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_URL: jdbc:postgresql://db:5432/${DB_NAME:-nurtricenter_patient_db}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    ports:
      - "8080:8080"

volumes:
  pgdata:
